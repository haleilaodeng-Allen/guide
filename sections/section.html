<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>板块</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500&family=Marcellus&family=Playfair+Display:wght@500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap');
  :root{
    --bg:#12100e;--cream:#f2ece1;--cream-dim:#c9bfae;--cream-faint:#7d7461;
    --gold:#c8a24b;--line:rgba(242,236,225,.14);
    --display:"Cormorant Garamond",Georgia,serif;--cn:"Noto Serif SC",serif;
    --sans:"Inter","PingFang SC",system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--cream);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px}
  .bar{display:flex;align-items:center;padding:24px 0 4px}
  .back{display:inline-flex;align-items:center;gap:7px;text-decoration:none;color:var(--cream-dim);
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;transition:color .25s}
  .back:hover{color:var(--cream)}
  .back .ar{width:16px;height:1px;background:currentColor;position:relative}
  .back .ar::before{content:"";position:absolute;left:0;top:-2px;width:5px;height:5px;
    border-left:1px solid currentColor;border-bottom:1px solid currentColor;transform:rotate(45deg)}

  header.top{padding:30px 0 14px;text-align:center}
  .kicker{font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
  header.top h1{font-family:var(--display);font-weight:600;font-size:clamp(46px,8vw,86px);line-height:.94;letter-spacing:.04em}
  .divider{width:36px;height:1px;background:var(--gold);margin:24px auto 0;opacity:.7}

  .boards{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:42px 0 80px;max-width:760px;margin:0 auto}
  .card{position:relative;display:block;aspect-ratio:3/4;border-radius:4px;overflow:hidden;
    text-decoration:none;color:var(--cream);isolation:isolate;cursor:pointer}
  .card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    transition:transform 1.1s cubic-bezier(.2,.6,.2,1),filter .8s;filter:brightness(.8) saturate(1.02)}
  .card::after{content:"";position:absolute;inset:0;z-index:1;
    background:linear-gradient(180deg,rgba(10,8,6,.15),rgba(10,8,6,.04) 38%,rgba(10,8,6,.55) 78%,rgba(10,8,6,.86))}
  .card .body{position:absolute;z-index:2;left:0;right:0;bottom:0;padding:30px 26px 32px;
    display:flex;flex-direction:column;gap:6px;transform:translateY(6px);transition:transform .6s cubic-bezier(.2,.6,.2,1)}
  .card .idx{font-family:var(--display);font-style:italic;font-size:17px;color:var(--gold);margin-bottom:2px}
  .card .name{font-size:clamp(26px,3.2vw,38px);line-height:1.04}
  .card .nrule{width:48px;height:1px;margin-top:12px;opacity:.85}
  .card .toprule,.card .botrule{display:flex;align-items:center;gap:10px;font-family:var(--sans);
    font-size:9px;letter-spacing:.4em;text-transform:uppercase}
  .card .toprule{margin-bottom:10px}.card .botrule{margin-top:12px}
  .card .toprule::before,.card .toprule::after,.card .botrule::before,.card .botrule::after{content:"";flex:1;height:1px}
  /* fine dining */
  .card.s-fine-dining .name{font-family:"Marcellus",serif;font-weight:400;letter-spacing:.22em;text-indent:.22em;color:#e6c272;text-shadow:0 1px 16px rgba(0,0,0,.45)}
  .card.s-fine-dining .nrule{width:100%;background:#c9a24b;opacity:.9;margin-top:14px}
  /* experience */
  .card.s-experience .name{font-family:"Playfair Display",serif;font-weight:500;letter-spacing:.06em;color:#fbf8f2;
    text-shadow:0 0 22px rgba(255,255,255,.6),0 0 6px rgba(255,255,255,.45),0 2px 12px rgba(0,0,0,.5)}
  .card.s-experience .toprule,.card.s-experience .botrule{color:rgba(201,140,224,.85)}
  .card.s-experience .toprule::before,.card.s-experience .toprule::after,
  .card.s-experience .botrule::before,.card.s-experience .botrule::after{background:linear-gradient(90deg,transparent,rgba(201,140,224,.7),transparent)}
  /* cafe club */
  .card.s-cafe-club .name{font-family:"Marcellus",serif;font-weight:400;letter-spacing:.12em;text-indent:.12em;
    color:transparent;-webkit-text-stroke:1px #e87ad6;
    text-shadow:0 0 7px rgba(232,122,214,.9),0 0 16px rgba(192,110,240,.7),0 0 30px rgba(154,108,255,.5)}
  .card.s-cafe-club .name .amp{-webkit-text-stroke:1px #ff7a4d;text-shadow:0 0 8px rgba(255,122,77,.9),0 0 18px rgba(255,122,77,.6)}
  .card.s-cafe-club .botrule{color:rgba(232,122,214,.9)}
  .card.s-cafe-club .botrule::before,.card.s-cafe-club .botrule::after{background:linear-gradient(90deg,transparent,rgba(232,122,214,.7),transparent)}
  /* local eats — warm gold serif with THE / flavors brackets */
  .card.s-local-eats .name{font-family:"Marcellus",serif;font-weight:400;letter-spacing:.14em;text-indent:.14em;
    color:#f0c873;text-shadow:0 0 18px rgba(240,200,115,.35),0 1px 14px rgba(0,0,0,.5)}
  .card.s-local-eats .toprule,.card.s-local-eats .botrule{color:rgba(240,200,115,.85)}
  .card.s-local-eats .toprule::before,.card.s-local-eats .toprule::after,
  .card.s-local-eats .botrule::before,.card.s-local-eats .botrule::after{background:linear-gradient(90deg,transparent,rgba(240,200,115,.6),transparent)}
  .card .sub{font-family:var(--cn);font-size:12.5px;color:var(--cream-dim);letter-spacing:.05em;line-height:1.5;margin-top:6px}
  .card .go{margin-top:14px;display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--cream);opacity:0;transform:translateY(4px);transition:opacity .5s,transform .5s}
  .card .go .arrow{display:inline-block;width:22px;height:1px;background:var(--gold);position:relative}
  .card .go .arrow::after{content:"";position:absolute;right:0;top:-2px;width:5px;height:5px;border-top:1px solid var(--gold);border-right:1px solid var(--gold);transform:rotate(45deg)}
  .card:hover img{transform:scale(1.06);filter:brightness(.9) saturate(1.06)}
  .card:hover .body{transform:translateY(0)}
  .card:hover .go{opacity:1;transform:translateY(0)}

  @media(max-width:820px){.boards{grid-template-columns:1fr;gap:14px}.card{aspect-ratio:16/10}.card .go{opacity:1;transform:none}.card .body{transform:none}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="bar"><a class="back" href="../index.html"><span class="ar"></span> 选择城市</a></div>
    <header class="top">
      <div class="kicker" id="kicker">CITY GUIDE</div>
      <h1 id="cityName">—</h1>
      <div class="divider"></div>
    </header>
    <main class="boards" id="boards"></main>
  </div>

  <script src="../data/guide-data.js"></script>
  <script>
    const params=new URLSearchParams(location.search);
    const cityId=params.get('city')||GUIDE.cities[0].id;
    const city=GUIDE.cities.find(c=>c.id===cityId)||GUIDE.cities[0];
    document.getElementById('kicker').textContent=`${city.nameEn} · CITY GUIDE`;
    document.getElementById('cityName').textContent=city.nameEn;

    const idxLabel=['I','II','III','IV'];
    const brackets={'fine-dining':{top:'',bot:''},'experience':{top:'THE',bot:city.nameEn},'cafe-club':{top:'',bot:'DAY TO NIGHT'},'local-eats':{top:'THE',bot:city.nameEn+' FLAVORS'}};
    const host=document.getElementById('boards');
    GUIDE.sections.forEach((s,i)=>{
      const a=document.createElement('a');
      a.className=`card s-${s.id}`;
      a.href=`feed.html?city=${cityId}&s=${s.id}`;
      const displayName=s.name.replace(/&/g,'<span class="amp">&</span>');
      const br=brackets[s.id]||{top:'',bot:''};
      const topRule=br.top?`<div class="toprule">${br.top}</div>`:'';
      let bottomEl;
      if(s.id==='fine-dining'){bottomEl=`<div class="nrule"></div>`;}
      else{bottomEl=br.bot?`<div class="botrule">${br.bot}</div>`:'';}
      a.innerHTML=`
        <img src="../${s.cover}" alt="${s.name}" style="object-position:${s.pos||'center'}">
        <div class="body">
          <div class="idx">${idxLabel[i]}</div>
          ${topRule}
          <div class="name">${displayName}</div>
          ${bottomEl}
          <div class="sub">${s.tagline||''}</div>
          <div class="go">进入 <span class="arrow"></span></div>
        </div>`;
      host.appendChild(a);
    });
  </script>
</body>
</html>
