<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>普吉岛 · 怎么玩</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;600&family=Playfair+Display:wght@500;600&family=Marcellus&display=swap');

  :root{
    --bg:#12100e;
    --bg-soft:#1a1714;
    --cream:#f2ece1;
    --cream-dim:#c9bfae;
    --gold:#c8a24b;
    --line:rgba(242,236,225,.14);
    --display:"Cormorant Garamond",Georgia,serif;
    --cn:"Noto Serif SC",serif;
    --sans:"Inter","PingFang SC",system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);color:var(--cream);
    font-family:var(--sans);min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1200px;margin:0 auto;padding:0 24px}

  /* ---- Masthead ---- */
  header.top{padding:64px 0 40px;text-align:center}
  .kicker{
    font-family:var(--sans);font-size:12px;letter-spacing:.5em;
    text-transform:uppercase;color:var(--gold);font-weight:400;
    margin-bottom:20px;text-indent:.5em;
  }
  header.top h1{
    font-family:var(--display);font-weight:600;
    font-size:clamp(52px,9vw,96px);line-height:.92;
    letter-spacing:.04em;color:var(--cream);
  }
  header.top .cn{
    font-family:var(--cn);font-size:clamp(18px,2.6vw,24px);font-weight:500;
    letter-spacing:.3em;color:var(--cream);margin-top:8px;text-indent:.3em;
  }
  header.top .tagline{
    font-family:var(--cn);font-size:14px;color:var(--cream-dim);
    margin-top:22px;letter-spacing:.08em;font-weight:400;
  }
  .divider{
    width:36px;height:1px;background:var(--gold);
    margin:34px auto 0;opacity:.7;
  }

  /* ---- Section cards ---- */
  .sections{
    display:grid;grid-template-columns:repeat(3,1fr);gap:18px;
    padding:48px 0 80px;
  }
  .card{
    position:relative;display:block;
    aspect-ratio:3/4;border-radius:4px;overflow:hidden;
    text-decoration:none;color:var(--cream);
    isolation:isolate;cursor:pointer;
  }
  .card img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;
    transition:transform 1.1s cubic-bezier(.2,.6,.2,1),filter .8s ease;
    filter:brightness(.82) saturate(1.02);
  }
  .card::after{   /* gradient for legibility */
    content:"";position:absolute;inset:0;z-index:1;
    background:linear-gradient(180deg,
      rgba(10,8,6,.15) 0%,
      rgba(10,8,6,.05) 38%,
      rgba(10,8,6,.55) 78%,
      rgba(10,8,6,.85) 100%);
  }
  .card .body{
    position:absolute;z-index:2;left:0;right:0;bottom:0;
    padding:30px 26px 32px;
    display:flex;flex-direction:column;gap:7px;
    transform:translateY(6px);transition:transform .6s cubic-bezier(.2,.6,.2,1);
  }
  .card .idx{
    font-family:var(--display);font-style:italic;font-size:17px;
    color:var(--gold);margin-bottom:2px;letter-spacing:.04em;
  }
  .card .name{
    font-family:var(--display);font-weight:600;
    font-size:clamp(28px,3.4vw,40px);line-height:1.04;letter-spacing:.02em;
  }
  .card .nrule{
    width:48px;height:1px;margin-top:12px;opacity:.85;
  }
  /* small label dashes that bracket the name (like the reference) */
  .card .toprule,.card .botrule{
    display:flex;align-items:center;gap:10px;
    font-family:var(--sans);font-size:9px;letter-spacing:.4em;
    text-transform:uppercase;
  }
  .card .toprule{margin-bottom:10px}
  .card .botrule{margin-top:12px}
  .card .toprule::before,.card .toprule::after,
  .card .botrule::before,.card .botrule::after{
    content:"";flex:1;height:1px;
  }

  /* ---- per-section signature type ---- */
  /* Fine Dining: elegant gold serif, wide tracking, full gold underline */
  .card.s-fine-dining .name{
    font-family:"Marcellus","Cormorant Garamond",serif;
    font-weight:400;letter-spacing:.22em;text-indent:.22em;
    color:#e6c272;
    text-shadow:0 1px 16px rgba(0,0,0,.45);
  }
  .card.s-fine-dining .nrule{
    width:100%;background:#c9a24b;opacity:.9;margin-top:14px;
  }

  /* Travel Experience: white serif, soft glow, dashes top & bottom */
  .card.s-experience .name{
    font-family:"Playfair Display","Cormorant Garamond",serif;
    font-weight:500;letter-spacing:.06em;color:#fbf8f2;
    text-shadow:0 0 22px rgba(255,255,255,.6),0 0 6px rgba(255,255,255,.45),0 2px 12px rgba(0,0,0,.5);
  }
  .card.s-experience .toprule,.card.s-experience .botrule{color:rgba(201,140,224,.85)}
  .card.s-experience .toprule::before,.card.s-experience .toprule::after,
  .card.s-experience .botrule::before,.card.s-experience .botrule::after{
    background:linear-gradient(90deg,transparent,rgba(201,140,224,.7),transparent);
  }

  /* Cafe & Club: hollow neon outline + strong glow */
  .card.s-cafe-club .name{
    font-family:"Marcellus","Cormorant Garamond",serif;
    font-weight:400;letter-spacing:.12em;text-indent:.12em;
    color:transparent;
    -webkit-text-stroke:1px #e87ad6;
    text-shadow:
      0 0 7px rgba(232,122,214,.9),
      0 0 16px rgba(192,110,240,.7),
      0 0 30px rgba(154,108,255,.5);
  }
  .card.s-cafe-club .name .amp{
    -webkit-text-stroke:1px #ff7a4d;
    text-shadow:0 0 8px rgba(255,122,77,.9),0 0 18px rgba(255,122,77,.6);
  }
  .card.s-cafe-club .botrule{color:rgba(232,122,214,.9)}
  .card.s-cafe-club .botrule::before,.card.s-cafe-club .botrule::after{
    background:linear-gradient(90deg,transparent,rgba(232,122,214,.7),transparent);
    box-shadow:0 0 6px rgba(232,122,214,.5);
  }
  .card .sub{
    font-family:var(--cn);font-size:12.5px;font-weight:400;
    color:var(--cream-dim);letter-spacing:.05em;line-height:1.5;
    margin-top:6px;max-width:90%;
    opacity:0;max-height:0;overflow:hidden;
    transition:opacity .5s ease,max-height .5s ease,margin-top .5s ease;
  }
  .card .go{
    margin-top:14px;display:inline-flex;align-items:center;gap:8px;
    font-family:var(--sans);font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--cream);
    opacity:0;transform:translateY(4px);
    transition:opacity .5s ease .05s,transform .5s ease .05s;
  }
  .card .go .arrow{
    display:inline-block;width:22px;height:1px;background:var(--gold);position:relative;
  }
  .card .go .arrow::after{
    content:"";position:absolute;right:0;top:-2px;width:5px;height:5px;
    border-top:1px solid var(--gold);border-right:1px solid var(--gold);
    transform:rotate(45deg);
  }
  /* hover */
  .card:hover img{transform:scale(1.06);filter:brightness(.92) saturate(1.06)}
  .card:hover .body{transform:translateY(0)}
  .card:hover .sub{opacity:1;max-height:60px;margin-top:6px}
  .card:hover .go{opacity:1;transform:translateY(0)}
  .card:focus-visible{outline:2px solid var(--gold);outline-offset:3px}

  footer{
    text-align:center;padding:0 0 48px;
    font-family:var(--sans);font-size:11.5px;color:var(--cream-dim);
    letter-spacing:.1em;opacity:.6;
  }

  @media (max-width:820px){
    .sections{grid-template-columns:1fr;gap:14px;padding:36px 0 56px}
    .card{aspect-ratio:16/10}
    /* on mobile, always show sub + go (no hover) */
    .card .sub{opacity:1;max-height:60px;margin-top:6px}
    .card .go{opacity:1;transform:none}
    .card .body{transform:none}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="kicker">Thailand · City Guide</div>
      <h1 id="cityEn">PHUKET</h1>
      <div class="cn" id="cityCn">普吉岛</div>
      <div class="tagline" id="cityTag"></div>
      <div class="divider"></div>
    </header>

    <main class="sections" id="sections"></main>

    <footer>本地私藏 · 持续更新</footer>
  </div>

  <script src="data/guide-data.js"></script>
  <script>
    const idxLabel = ['I','II','III','IV','V'];
    document.getElementById('cityEn').textContent = GUIDE.city.nameEn;
    document.getElementById('cityCn').textContent = GUIDE.city.name;
    document.getElementById('cityTag').textContent = GUIDE.city.tagline;

    const host = document.getElementById('sections');
    // small bracket labels per section (meaningful words, not random)
    const brackets = {
      'fine-dining': {top:'', bot:''},
      'experience':  {top:'THE', bot:'PHUKET'},
      'cafe-club':   {top:'', bot:'DAY TO NIGHT'},
    };
    GUIDE.sections.forEach((s, i) => {
      const a = document.createElement('a');
      a.className = `card s-${s.id}`;
      a.href = `sections/section.html?s=${s.id}`;
      const displayName = s.name.replace(/&/g, '<span class="amp">&</span>');
      const br = brackets[s.id] || {top:'',bot:''};
      const topRule = br.top ? `<div class="toprule">${br.top}</div>` : '';
      // Fine Dining uses a full underline rule; others use bottom dash-label
      let bottomEl;
      if (s.id === 'fine-dining') {
        bottomEl = `<div class="nrule"></div>`;
      } else {
        bottomEl = br.bot ? `<div class="botrule">${br.bot}</div>` : '';
      }
      a.innerHTML = `
        <img src="${s.cover}" alt="${s.name}" style="object-position:${s.pos||'center'}">
        <div class="body">
          <div class="idx">${idxLabel[i]}</div>
          ${topRule}
          <div class="name">${displayName}</div>
          ${bottomEl}
          <div class="sub">${s.tagline||''}</div>
          <div class="go">进入 <span class="arrow"></span></div>
        </div>`;
      host.appendChild(a);
    });
  </script>
</body>
</html>
