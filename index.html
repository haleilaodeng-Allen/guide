<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Guide · Allen Luo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500&family=Noto+Serif+SC:wght@400;500;600&display=swap');
  :root{
    --bg:#12100e;--bg-card:#1b1815;--bg-card-h:#221e1a;
    --cream:#f2ece1;--cream-dim:#b3a994;--cream-faint:#7d7461;
    --gold:#c8a24b;--gold-soft:#e3c989;--line:rgba(242,236,225,.12);
    --display:"Cormorant Garamond",Georgia,serif;
    --cn:"Noto Serif SC",serif;
    --sans:"Inter","PingFang SC",system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:radial-gradient(1100px 560px at 50% -10%,#1d1a16 0%,transparent 62%),var(--bg);
    color:var(--cream);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}

  header.top{padding:72px 0 8px;text-align:center}
  .brand{font-family:var(--sans);font-size:12px;letter-spacing:.4em;text-transform:uppercase;
    color:var(--gold);font-weight:400;margin-bottom:26px}
  header.top h1{font-family:var(--display);font-weight:600;font-size:clamp(40px,7vw,72px);
    line-height:1;letter-spacing:.03em;color:var(--cream)}
  header.top h1 em{font-style:italic;color:var(--gold-soft)}
  header.top .sub{font-family:var(--cn);font-size:14px;color:var(--cream-dim);margin-top:20px;letter-spacing:.14em}
  .divider{width:36px;height:1px;background:var(--gold);margin:30px auto 0;opacity:.7}

  .cities{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:46px 0 40px}
  @media(max-width:680px){.cities{grid-template-columns:1fr;gap:14px}}

  .city{position:relative;display:flex;flex-direction:column;justify-content:space-between;
    min-height:180px;padding:26px 28px;text-decoration:none;color:var(--cream);
    background:var(--bg-card);border:1px solid var(--line);border-radius:10px;overflow:hidden;
    transition:transform .45s cubic-bezier(.2,.6,.2,1),border-color .45s,background .45s}
  .city::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:linear-gradient(180deg,var(--gold),transparent);opacity:0;transition:opacity .45s}
  .city:hover{transform:translateY(-4px);border-color:rgba(200,162,75,.4);background:var(--bg-card-h)}
  .city:hover::before{opacity:1}
  .city .idx{font-family:var(--display);font-style:italic;font-size:15px;color:var(--gold);opacity:.85}
  .city .nameEn{font-family:var(--display);font-weight:600;font-size:clamp(30px,4.4vw,46px);
    line-height:1;letter-spacing:.02em;margin-top:6px}
  .city .nameCn{font-family:var(--cn);font-size:15px;font-weight:500;letter-spacing:.28em;
    color:var(--cream-dim);margin-top:12px}
  .city .go{position:absolute;right:26px;bottom:26px;width:30px;height:30px;border-radius:50%;
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    transition:border-color .4s,background .4s}
  .city .go i{width:7px;height:7px;border-top:1.5px solid var(--cream-dim);border-right:1.5px solid var(--cream-dim);
    transform:rotate(45deg);margin-left:-2px;transition:border-color .4s}
  .city:hover .go{border-color:var(--gold);background:rgba(200,162,75,.12)}
  .city:hover .go i{border-color:var(--gold-soft)}

  footer{text-align:center;padding:8px 0 54px;font-family:var(--sans);font-size:11.5px;
    color:var(--cream-faint);letter-spacing:.16em}

  @media(max-width:680px){.city{min-height:130px;padding:22px 24px}}
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand">Allen Luo · City Guide</div>
      <h1>Where <em>to</em></h1>
      <div class="sub">挑一座城，看本地人怎么玩</div>
      <div class="divider"></div>
    </header>
    <main class="cities" id="cities"></main>
    <footer>本地私藏 · 持续更新</footer>
  </div>

  <script src="data/guide-data.js"></script>
  <script>
    const idx=['I','II','III','IV','V','VI','VII','VIII'];
    const host=document.getElementById('cities');
    GUIDE.cities.forEach((c,i)=>{
      const a=document.createElement('a');
      a.className='city';
      a.href=`sections/section.html?city=${c.id}`;
      a.innerHTML=`
        <div>
          <div class="idx">${idx[i]}</div>
          <div class="nameEn">${c.nameEn}</div>
        </div>
        <div class="nameCn">${c.name}</div>
        <div class="go"><i></i></div>`;
      host.appendChild(a);
    });
  </script>
</body>
</html>
